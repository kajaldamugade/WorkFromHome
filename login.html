<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign In — WorkFromHome</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif;">

<div class="login-page" style="width: 100%; max-width: 400px; padding: 20px;">
    <div class="auth-card" style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;">
        <div class="auth-header" style="text-align: center; margin-bottom: 30px;">
            <a href="index.html" style="text-decoration: none; color: #64748b; font-size: 0.9rem; display: block; margin-bottom: 10px;">← Back to Home</a>
            <h2 style="margin-bottom: 8px;">Sign In</h2>
            <p style="color: #64748b;">Welcome back to the community.</p>
        </div>
        
        <form action="http://localhost:5000/api/login" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email Address" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box;">
            </div>
            <button type="submit" class="btn-login" style="background: #2563eb; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%;">Login</button>
        </form>

        <div class="divider" style="margin: 20px 0; text-align: center; color: #94a3b8; position: relative;">
            <span style="background: white; padding: 0 10px;">or</span>
        </div>

        <button class="btn-google" style="display: flex; align-items: center; justify-content: center; gap: 10px; background: white; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" width="20"> Continue with Google
        </button>

        <p class="auth-footer" style="margin-top: 25px; text-align: center; font-size: 0.9rem;">
            New here? <a href="register.html" style="color: #2563eb; font-weight: 600; text-decoration: none;">Create an account</a>
        </p>
    </div>
</div>

<script>
    const loginForm = document.querySelector('form');
    
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Stop page from reloading
        
        const email = loginForm.email.value;
        const password = loginForm.password.value;

        try {
            const response = await fetch('http://localhost:5000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                // SAVE THE NAME HERE
                localStorage.setItem('userName', data.fullName);
                // REDIRECT MANUALLY
                window.location.href = 'index.html';
            } else {
                alert("Login failed. Check your email or password.");
            }
        } catch (err) {
            console.error("Error:", err);
        }
    });
</script>
</body>
</html>
