<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Join Free — WorkFromHome</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

  <div class="modal-content" style="display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; padding: 40px; background: white; border-radius: 12px; width: 100%; max-width: 400px;">
    <a href="index.html" style="text-decoration: none; color: #64748b; font-size: 0.9rem; margin-bottom: 10px;">← Back to Home</a>
    <h3>Create Account</h3>
    <p style="color: #64748b; margin-bottom: 20px;">Start your remote career journey today.</p>
    
 <form action="http://localhost:5000/api/register" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
  <input type="text" name="fullName" placeholder="Full Name" required style="padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
  <input type="email" name="email" placeholder="Email Address" required style="padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
  <input type="password" name="password" placeholder="Create Password" required style="padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
  <button type="submit" class="btn-solid">Join Now</button>
</form>

    <div class="divider" style="margin: 20px 0; text-align: center; color: #94a3b8;">or</div>

    <button class="btn-google" style="display: flex; align-items: center; justify-content: center; gap: 10px; background: white; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; cursor: pointer;">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" style="width: 20px;"> 
      Continue with Google
    </button>

    <p style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
      Already have an account? <a href="login.html" style="color: #2563eb; font-weight: 600; text-decoration: none;">Sign In</a>
    </p>
  </div>

</body>
</html>
